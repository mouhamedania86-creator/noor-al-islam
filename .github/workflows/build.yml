name: 🕌 Build Noor Al-Islam APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: 🏗️ Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: 📥 تحميل الكود من GitHub
        uses: actions/checkout@v4

      - name: ☕ تجهيز Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 تنصيب Android SDK
        run: |
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
          yes | sdkmanager --licenses 2>&1 | tail -3 || true
          sdkmanager "platform-tools" 2>&1 | tail -3
          sdkmanager "platforms;android-36" 2>&1 | tail -3
          sdkmanager "build-tools;36.0.0" 2>&1 | tail -3
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: 📦 تنصيب Gradle 9.3.1
        run: |
          GRADLE_VERSION=9.3.1
          wget -q https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip
          unzip -q gradle-${GRADLE_VERSION}-bin.zip
          echo "${GITHUB_WORKSPACE}/gradle-${GRADLE_VERSION}/bin" >> $GITHUB_PATH
          rm gradle-${GRADLE_VERSION}-bin.zip
          gradle --version

      - name: 🔑 إنشاء ملف .env
        run: |
          if [ -n "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
          else
            cp .env.example .env
          fi

      - name: 🔧 توليد Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 9.3.1 --distribution-type bin
          chmod +x gradlew

      - name: 🩹 تحويل من KSP إلى KAPT
        run: |
          echo "🔄 تحويل المشروع من KSP إلى KAPT..."
          sed -i '/google-devtools-ksp/d' gradle/libs.versions.toml
          sed -i '/googleDevtoolsKsp/d' gradle/libs.versions.toml
          if ! grep -q "kotlin-kapt" gradle/libs.versions.toml; then
            sed -i '/\[plugins\]/a kotlin-kapt = { id = "org.jetbrains.kotlin.kapt", version.ref = "kotlin" }' gradle/libs.versions.toml
          fi
          sed -i '/google.devtools.ksp/d' build.gradle.kts
          if ! grep -q "kotlin.kapt" build.gradle.kts; then
            sed -i 's/alias(libs.plugins.roborazzi)/alias(libs.plugins.kotlin.kapt) apply false\n  alias(libs.plugins.roborazzi)/' build.gradle.kts
          fi
          sed -i '/google.devtools.ksp/d' app/build.gradle.kts
          if ! grep -q "kotlin.kapt" app/build.gradle.kts; then
            sed -i 's/alias(libs.plugins.roborazzi)/alias(libs.plugins.kotlin.kapt)\n  alias(libs.plugins.roborazzi)/' app/build.gradle.kts
          fi
          sed -i 's|"ksp"(libs.androidx.room.compiler)|"kapt"(libs.androidx.room.compiler)|g' app/build.gradle.kts
          sed -i '/"ksp"(libs.moshi.kotlin.codegen)/d' app/build.gradle.kts
          sed -i '/ksp\./d' gradle.properties
          sed -i '/org.gradle.unsafe.configuration-cache/d' gradle.properties
          echo "✅ تم التحويل"

      - name: 🔐 توليد debug.keystore
        run: |
          if [ ! -f debug.keystore ]; then
            keytool -genkey -v \
              -keystore debug.keystore \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -alias androiddebugkey \
              -keypass android -storepass android \
              -dname "CN=Android Debug, O=Android, C=US" 2>&1 | tail -3
          fi
          echo "debug.keystore" >> .gitignore

      - name: 🏗️ بناء Debug APK
        env:
          GRADLE_OPTS: "-Xmx4g -Dfile.encoding=UTF-8 -XX:+UseG1GC"
        run: |
          echo "🚀 بدء البناء..."
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log | tail -100
          echo "==== END ===="
          echo "🔍 الأخطاء:"
          grep -B 1 -A 5 "FAILURE\|What went wrong" build.log | head -60 || true

      - name: 📤 رفع Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: noor-al-islam-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: 📋 رفع Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_id }}
          path: |
            app/build/outputs/logs/
            app/build/reports/
            build.log
          if-no-files-found: ignore
          retention-days: 7
