name: 🕌 Build Noor Al-Islam APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: 🏗️ Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: 📥 تحميل الكود من GitHub
        uses: actions/checkout@v4

      - name: ☕ تجهيز Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 تنصيب Android SDK
        run: |
          echo "📍 SDK Location: $ANDROID_HOME"
          ls $ANDROID_HOME/cmdline-tools/ 2>/dev/null || echo "⚠️ No cmdline-tools found"
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
          echo "📜 قبول تراخيص SDK..."
          yes | sdkmanager --licenses 2>&1 | tail -3 || true
          echo "📦 تنصيب platform-tools..."
          sdkmanager "platform-tools" 2>&1 | tail -3
          echo "📦 تنصيب platforms;android-36..."
          sdkmanager "platforms;android-36" 2>&1 | tail -3
          echo "📦 تنصيب build-tools;36.0.0..."
          sdkmanager "build-tools;36.0.0" 2>&1 | tail -3
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "✅ SDK جاهز"

      - name: 📦 تنصيب Gradle 8.14
        run: |
          GRADLE_VERSION=8.14
          wget -q https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip
          unzip -q gradle-${GRADLE_VERSION}-bin.zip
          echo "${GITHUB_WORKSPACE}/gradle-${GRADLE_VERSION}/bin" >> $GITHUB_PATH
          rm gradle-${GRADLE_VERSION}-bin.zip
          gradle --version

      - name: 🔑 إنشاء ملف .env
        run: |
          if [ -n "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
            echo "✅ تم إنشاء .env بمفتاح Gemini"
          else
            echo "⚠️ GEMINI_API_KEY غير مضبوط - استخدام placeholder"
            cp .env.example .env
          fi

      - name: 🔧 توليد Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.14 --distribution-type bin
          chmod +x gradlew
          echo "✅ تم توليد Wrapper"

      - name: 🔐 توليد debug.keystore
        run: |
          if [ ! -f debug.keystore ]; then
            keytool -genkey -v \
              -keystore debug.keystore \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -alias androiddebugkey \
              -keypass android \
              -storepass android \
              -dname "CN=Android Debug, O=Android, C=US" 2>&1 | tail -3
            echo "✅ تم توليد debug.keystore"
          fi
          echo "debug.keystore" >> .gitignore

      - name: 🏗️ بناء Debug APK
        env:
          GRADLE_OPTS: "-Xmx4g -Dfile.encoding=UTF-8 -XX:+UseG1GC"
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 📤 رفع Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: noor-al-islam-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: 📋 رفع Logs في حالة الفشل
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_id }}
          path: |
            app/build/outputs/logs/
            app/build/reports/
            ~/.gradle/daemon/*.log
          if-no-files-found: ignore
          retention-days: 7
