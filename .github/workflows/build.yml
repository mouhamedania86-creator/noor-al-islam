name: 🕌 Build Noor Al-Islam APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # زر تشغيل يدوي من GitHub

jobs:
  build:
    name: 🏗️ Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ============================================
      # 1. تحميل الكود
      # ============================================
      - name: 📥 تحميل الكود من GitHub
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ============================================
      # 2. تجهيز Java 17 (مطلوب لـ AGP 9.x)
      # ============================================
      - name: ☕ تجهيز Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ============================================
      # 3. تجهيز Android SDK مع API 36
      # ============================================
      - name: 🤖 تجهيز Android SDK
        uses: android-actions/setup-android@v3
        with:
          # قبول كل التراخيص تلقائياً
          android-licenses: |
            android-sdk-license
            android-sdk-preview-license
          # تثبيت الحزم المطلوبة لـ compileSdk 36
          packages: |
            platform-tools
            platforms;android-36
            build-tools;36.0.0

      # ============================================
      # 4. تنصيب Gradle 8.14 (متوافق مع AGP 9.1.1)
      # ============================================
      - name: 📦 تنصيب Gradle 8.14
        run: |
          GRADLE_VERSION=8.14
          echo "⏬ تحميل Gradle ${GRADLE_VERSION}..."
          wget -q https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip
          unzip -q gradle-${GRADLE_VERSION}-bin.zip
          echo "${GITHUB_WORKSPACE}/gradle-${GRADLE_VERSION}/bin" >> $GITHUB_PATH
          rm gradle-${GRADLE_VERSION}-bin.zip
          gradle --version

      # ============================================
      # 5. إنشاء ملف .env من GitHub Secrets
      # ============================================
      - name: 🔑 إنشاء ملف .env
        run: |
          if [ -n "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
            echo "✅ تم إنشاء .env بمفتاح Gemini"
          else
            echo "⚠️ GEMINI_API_KEY غير مضبوط في GitHub Secrets - سيتم استخدام placeholder"
            cp .env.example .env
          fi
          echo "📄 محتوى .env:"
          cat .env

      # ============================================
      # 6. توليد Gradle Wrapper (مفقود في المشروع)
      # ============================================
      - name: 🔧 توليد Gradle Wrapper
        run: |
          echo "⏬ توليد gradlew و gradlew.bat..."
          gradle wrapper --gradle-version 8.14 --distribution-type bin
          chmod +x gradlew
          echo "✅ تم توليد Wrapper"

      # ============================================
      # 6.5 توليد debug.keystore (مفقود من المشروع)
      # ============================================
      - name: 🔐 توليد debug.keystore
        run: |
          if [ ! -f debug.keystore ]; then
            echo "⏬ توليد debug.keystore..."
            keytool -genkey -v \
              -keystore debug.keystore \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -alias androiddebugkey \
              -keypass android \
              -storepass android \
              -dname "CN=Android Debug, O=Android, C=US" 2>&1 | tail -3
            echo "✅ تم توليد debug.keystore"
          else
            echo "✅ debug.keystore موجود بالفعل"
          fi
          echo "debug.keystore" >> .gitignore

      # ============================================
      # 6.6 إنشاء مجلد assets إذا مش موجود
      # ============================================
      - name: 📁 تجهيز مجلد assets
        run: |
          mkdir -p app/src/main/assets
          # إضافة ملفات placeholder للأذان والرقية لتفادي crashes
          if [ ! -f app/src/main/assets/adhan.mp3 ]; then
            echo "⚠️ adhan.mp3 مفقود - التطبيق سيستخدم صوت النظام كـ fallback"
            echo "PLACEHOLDER: ضع ملف adhan.mp3 الحقيقي هنا" > app/src/main/assets/README_MISSING.txt || true
          fi
          if [ ! -f app/src/main/assets/ruqyah.mp3 ]; then
            echo "⚠️ ruqyah.mp3 مفقود"
          fi

      # ============================================
      # 7. بناء Debug APK
      # ============================================
      - name: 🏗️ بناء Debug APK
        env:
          GRADLE_OPTS: "-Xmx4g -Dfile.encoding=UTF-8 -XX:+UseG1GC"
        run: |
          echo "🚀 بدء البناء..."
          ./gradlew assembleDebug --no-daemon --stacktrace
          echo "✅ انتهى البناء"

      # ============================================
      # 8. رفع APK كـ Artifact (ينزله المستخدم)
      # ============================================
      - name: 📤 رفع Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: noor-al-islam-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      # ============================================
      # 9. بناء Release APK (اختياري - يحتاج keystore)
      # ============================================
      - name: 🏗️ بناء Release APK
        if: ${{ env.SHOULD_BUILD_RELEASE == 'true' }}
        env:
          GRADLE_OPTS: "-Xmx4g -Dfile.encoding=UTF-8 -XX:+UseG1GC"
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        continue-on-error: true

      - name: 📤 رفع Release APK
        if: ${{ env.SHOULD_BUILD_RELEASE == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: noor-al-islam-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 30

      # ============================================
      # 10. رفع logs عند الفشل للمساعدة في التشخيص
      # ============================================
      - name: 📋 رفع Logs في حالة الفشل
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_id }}
          path: |
            app/build/outputs/logs/
            app/build/reports/
            ~/.gradle/daemon/*.log
          if-no-files-found: ignore
          retention-days: 7
